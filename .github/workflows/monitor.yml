name: Monitor Diário — SST e DOU

on:
  schedule:
    - cron: '0 10 * * 1-5'
    - cron: '0 11 * * 1-5'
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Motivo da execução manual'
        required: false
        default: 'Verificação manual'

permissions:
  contents: write

jobs:
  monitor-sst:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar conectividade
        id: net_check
        run: |
          echo "Testando acesso ao DOU e MTE..."
          connected=false
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 15 "https://www.in.gov.br" > /dev/null 2>&1; then
              echo "✅ Conectado na tentativa $i"
              connected=true
              break
            fi
            echo "⏳ Tentativa $i falhou — aguardando 30s..."
            sleep 30
          done
          echo "connected=$connected" >> $GITHUB_OUTPUT
          if [ "$connected" = "false" ]; then
            echo "❌ Sem conexão após 5 tentativas"
            exit 1
          fi

      - name: Executar monitoramento (com retry)
        if: steps.net_check.outputs.connected == 'true'
        run: |
          cd scripts
          success=false
          for i in 1 2 3; do
            echo "--- Tentativa $i de 3 ---"
            if python check_dou.py; then
              success=true
              break
            fi
            echo "Falhou — aguardando 60s..."
            sleep 60
          done
          if [ "$success" = "false" ]; then
            echo "⚠️ Todas as tentativas falharam"
            exit 1
          fi

      - name: Salvar estado no repositório
        if: always()
        run: |
          git config user.name  "Monitor SST Bot"
          git config user.email "monitor-sst@github-actions"
          git add data/state.json
          git diff --cached --quiet || git commit -m "chore: monitoramento $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
