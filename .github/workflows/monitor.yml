name: Monitor Diário de NR

on:
  schedule:
    # Roda todo dia às 10:00 UTC = 07:00 horário de Brasília
    - cron: '0 10 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo painel do GitHub
    inputs:
      reason:
        description: 'Motivo da execução manual'
        required: false
        default: 'Verificação manual'

permissions:
  contents: write   # necessário para fazer commit do state.json

jobs:
  check-nr:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verificar NR (sem dependências externas)
        run: |
          cd scripts
          python check_nr.py

      - name: Salvar estado atualizado no repositório
        run: |
          git config user.name  "NR Monitor Bot"
          git config user.email "nr-monitor@github-actions"
          git add data/state.json
          # Só faz commit se o arquivo tiver mudado
          git diff --cached --quiet || git commit -m "chore: atualização automática $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
